<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;height:100%;background:#1c1c1a;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,'Segoe UI',sans-serif;overflow:hidden}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
  .logo{width:52px;height:52px;border-radius:13px;background:#1D9E75;display:flex;align-items:center;
    justify-content:center;font-size:26px;font-weight:700;color:#fff;
    animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
  .label{color:#9a9a96;font-size:12px;letter-spacing:.02em}
  .dots span{animation:blink 1.4s infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">P</div>
    <div class="label">Starting PrepAI<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
  </div>
</body>
</html>
